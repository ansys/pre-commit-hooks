version: 2
updates:
  - package-ecosystem: "pip"
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 10
      semver-patch-days: 7
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "maintenance"
      - "dependencies"
    groups:
       python-deps:
          patterns:
            - "*"

  - package-ecosystem: "github-actions"
    cooldown:
      default-days: 7
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "maintenance"
    groups:
       actions:
          patterns:
            - "*"
